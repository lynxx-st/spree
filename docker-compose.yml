services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5

  spree:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
    ports:
      - "3000:3000"

  nextjs:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - spree
    environment:
      SPREE_API_URL: http://spree:3000
      SPREE_PUBLISHABLE_KEY: ${SPREE_PUBLISHABLE_KEY}
      NODE_ENV: development
    volumes:
      - ./storefront:/app
      - storefront_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  storefront_node_modules:
